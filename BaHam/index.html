<style>
@font-face {
  font-family: 'Vazirmatn';
  src: url('fonts/Vazirmatn-Regular.woff2') format('woff2');
  font-weight: 400; font-display: swap;
}
@font-face {
  font-family: 'Vazirmatn';
  src: url('fonts/Vazirmatn-Bold.woff2') format('woff2');
  font-weight: 700; font-display: swap;
}

:root {
  --primary: #0f766e;
  --primary-light: #10b981;
  --background: #f7faf9;
  --interactive: #e6fffb;
  --text-primary: #212121;
  --text-muted: #4b5563;
  --accent-amber: #f59e0b;
  --card: #ffffff;
  --border: #d6e8e5;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Vazirmatn', Tahoma, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--background);
  color: var(--text-primary);
  padding-top: 64px;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

/* ---------- Navigation ---------- */
.mathswell-nav {
  position: fixed; top: 0; left: 0; right: 0;
  background: #fff;
  border-bottom: 2px solid var(--primary);
  padding: 0.7rem 1rem;
  z-index: 1000;
  display: flex; justify-content: center; align-items: center;
}
.mw-link {
  display: flex; align-items: center; gap: 0.5rem;
  text-decoration: none; color: var(--primary);
  font-weight: 700; letter-spacing: 1px;
}
.lang-toggle {
  position: absolute; inset-inline-end: 1rem; top: 50%;
  transform: translateY(-50%);
  display: flex; gap: 0.25rem;
  background: var(--background); border-radius: 999px; padding: 0.2rem;
}
.lang-toggle button {
  border: none; background: transparent; cursor: pointer;
  padding: 0.25rem 0.7rem; border-radius: 999px;
  font-family: inherit; font-size: 0.85rem; color: var(--text-muted);
  transition: all 0.2s ease;
}
.lang-toggle button.active { background: var(--primary); color: #fff; }

/* ---------- Layout ---------- */
.container { max-width: 760px; margin: 0 auto; padding: 0 1.2rem; }
section { margin: 3rem 0; }
.section-title {
  font-size: 1.25rem; color: var(--primary); font-weight: 700;
  margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
}

/* ---------- Hero ---------- */
.hero { text-align: center; padding: 3rem 0 1rem; }
.hero h1 { font-size: 3.5rem; color: var(--primary); letter-spacing: 1px; }
.hero .tagline { font-size: 1.2rem; color: var(--primary-light); margin-top: 0.3rem; font-weight: 700; }
.hero .intro { max-width: 560px; margin: 1.3rem auto 0; color: var(--text-muted); }

/* ---------- Counters ---------- */
.counters { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.counter {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.3rem 1.6rem; text-align: center;
  flex: 1 1 150px; max-width: 200px;
  box-shadow: 0 4px 16px rgba(15,118,110,0.06);
}
.counter .num { font-size: 2.4rem; font-weight: 700; color: var(--primary); }
.counter .lbl { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.2rem; }

/* ---------- Cards ---------- */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 1.5rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}
.card + .card { margin-top: 1rem; }

/* ---------- Home / CTAs ---------- */
.home-card { background: var(--interactive); border-color: var(--primary); }
.btn {
  display: inline-block; background: var(--primary); color: #fff;
  text-decoration: none; padding: 0.7rem 1.5rem; border-radius: 8px;
  font-weight: 700; font-family: inherit; border: none; cursor: pointer;
  transition: all 0.2s ease; font-size: 1rem; margin-top: 0.8rem;
}
.btn:hover { background: var(--primary-light); transform: translateY(-2px); }
.btn-ghost {
  background: #fff; color: var(--primary); border: 2px solid var(--primary);
}
.btn-ghost:hover { background: var(--interactive); }
.muted-note { color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem; }

/* ---------- Question ---------- */
.q-month {
  display: inline-block; background: var(--primary); color: #fff;
  font-size: 0.8rem; padding: 0.2rem 0.8rem; border-radius: 999px; margin-bottom: 0.7rem;
}
.q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 1rem; }
.summary-box {
  background: var(--interactive); border-inline-start: 4px solid var(--primary);
  border-radius: 8px; padding: 1rem 1.2rem; color: var(--text-primary);
}
.q-link { display: inline-block; color: var(--primary); font-weight: 700; text-decoration: none; margin-top: 1rem; }
.q-link:hover { text-decoration: underline; }

/* ---------- Gatherings ---------- */
.next-card { border-color: var(--accent-amber); }
.next-date { color: var(--accent-amber); font-weight: 700; }
.next-name { font-size: 1.15rem; font-weight: 700; margin: 0.3rem 0; }
.next-presenter { color: var(--text-muted); font-size: 0.9rem; }
.recent-item { display: flex; flex-direction: column; gap: 0.1rem; }
.recent-item + .recent-item { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
.recent-date { color: var(--primary); font-weight: 700; font-size: 0.9rem; }
.recent-name { font-weight: 700; }
.recent-presenter { color: var(--text-muted); font-size: 0.85rem; }
.recent-link { color: var(--primary); font-size: 0.85rem; text-decoration: none; }
.recent-link:hover { text-decoration: underline; }

/* ---------- Readings ---------- */
.reading-item { display: flex; flex-direction: column; gap: 0.1rem; }
.reading-item + .reading-item { margin-top: 0.9rem; padding-top: 0.9rem; border-top: 1px solid var(--border); }
.reading-title { font-weight: 700; }
.reading-title a { color: var(--primary); text-decoration: none; }
.reading-title a:hover { text-decoration: underline; }
.reading-author { color: var(--text-muted); font-size: 0.85rem; }
.reading-why { color: var(--text-muted); font-size: 0.9rem; }

/* ---------- Install as app ---------- */
.install-card { background: var(--card); }
.install-platforms { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.8rem; }
.install-col {
  flex: 1 1 240px; background: var(--background);
  border: 1px solid var(--border); border-radius: 10px; padding: 1rem;
}
.install-col.highlight { border-color: var(--primary); background: var(--interactive); }
.install-col h4 { color: var(--primary); font-size: 0.95rem; margin-bottom: 0.4rem; }
.install-col ol { margin-inline-start: 1.1rem; color: var(--text-muted); font-size: 0.9rem; }
.install-col li { margin-bottom: 0.3rem; }

/* ---------- Footer ---------- */
footer { text-align: center; color: var(--text-muted); padding: 2rem 0 3rem; font-size: 0.9rem; }

/* ---------- Reveal animation ---------- */
.reveal { opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease, transform 0.5s ease; }
.reveal.in { opacity: 1; transform: none; }

/* ---------- Edit mode ---------- */
.edit-fab {
  position: fixed; inset-block-end: 1.2rem; inset-inline-end: 1.2rem;
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none; cursor: pointer;
  font-size: 1.2rem; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 1100;
  display: flex; align-items: center; justify-content: center;
}
.edit-fab:hover { background: var(--primary-light); }
.edit-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 1200; display: none; justify-content: center; align-items: flex-start;
  overflow-y: auto; padding: 2rem 1rem;
}
.edit-overlay.open { display: flex; }
.edit-panel {
  background: #fff; border-radius: 14px; max-width: 720px; width: 100%;
  padding: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.3); direction: rtl;
}
.edit-panel h2 { color: var(--primary); margin-bottom: 0.3rem; }
.edit-panel .hint { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
.edit-group { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1rem; overflow: hidden; }
.edit-group > summary {
  background: var(--interactive); padding: 0.7rem 1rem; cursor: pointer;
  font-weight: 700; color: var(--primary);
}
.edit-group .group-body { padding: 1rem; }
.field { margin-bottom: 0.9rem; }
.field label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.25rem; }
.field input, .field textarea {
  width: 100%; padding: 0.6rem; border: 1px solid var(--border);
  border-radius: 8px; font-family: inherit; font-size: 16px; background: var(--background);
}
.field textarea { min-height: 80px; resize: vertical; line-height: 1.7; }
.repeat-row { border: 1px dashed var(--border); border-radius: 8px; padding: 0.8rem; margin-bottom: 0.7rem; position: relative; }
.repeat-row .remove-row {
  position: absolute; inset-inline-end: 0.5rem; inset-block-start: 0.5rem;
  background: none; border: none; color: var(--accent-amber); cursor: pointer; font-size: 1.1rem;
}
.add-row { background: var(--interactive); color: var(--primary); border: 1px dashed var(--primary);
  border-radius: 8px; padding: 0.5rem 1rem; cursor: pointer; font-family: inherit; font-weight: 700; }
.edit-actions { display: flex; gap: 0.7rem; flex-wrap: wrap; margin-top: 1.2rem; }
.edit-actions .btn { margin-top: 0; }
.tiny-note { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.8rem; line-height: 1.6; }

/* ---------- LTR adjustments ---------- */
html[dir="ltr"] body { line-height: 1.7; }
html[dir="ltr"] .summary-box { border-inline-start: 4px solid var(--primary); }

/* ---------- Mobile ---------- */
@media (max-width: 600px) {
  .hero h1 { font-size: 2.6rem; }
  .lang-toggle { position: static; transform: none; margin-inline-start: auto; }
  .mathswell-nav { justify-content: space-between; }
  .counter { flex: 1 1 120px; padding: 1rem; }
  .counter .num { font-size: 1.9rem; }
  input, textarea, button { font-size: 16px; }
}
</style>

const PLATFORM = (() => {
  const ua = navigator.userAgent || '';
  if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
  if (/Android/i.test(ua)) return 'android';
  return 'other';
})();

/* ---------- helpers ---------- */
function toPersianDigits(str) {
  const map = '۰۱۲۳۴۵۶۷۸۹';
  return String(str).replace(/[0-9]/g, d => map[+d]);
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function mdLite(s) {
  return esc(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
}
function setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
function setHTML(id, val) { const el = document.getElementById(id); if (el) el.innerHTML = val; }

/* ---------- render ---------- */

  setText('brand', isFa ? 'باهم' : 'Baham');
  setText('tagline', c.tagline);
  setText('intro', c.intro);

  setText('homeTitle', c.homeTitle);

  const gb = document.getElementById('groupBtn');

  setText('bookmarkNote', c.bookmarkNote);

    const title = r.url ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title)}</a>` : esc(r.title);
    const author = r.author && r.author !== '—' ? `<span class="reading-author">${esc(r.author)}</span>` : '';
    return `<div class="reading-item"><span class="reading-title">${title}</span>${author}<span class="reading-why">${esc(r.why)}</span></div>`;

/* ---------- counter count-up ---------- */
function maybeAnimateCounters() {
  if (countersAnimated) return;
  countersAnimated = true;
  const isFa = lang === 'fa';
  document.querySelectorAll('.counter .num').forEach(el => {
    const target = parseInt(el.dataset.target, 10) || 0;
    if (target === 0) { el.textContent = isFa ? toPersianDigits(0) : 0; return; }
    const dur = 900, start = performance.now();
    function step(now) {
      const p = Math.min((now - start) / dur, 1);
      const eased = 1 - Math.pow(1 - p, 3);
      const val = Math.round(target * eased);
      el.textContent = isFa ? toPersianDigits(val) : val;
      if (p < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}

/* ---------- language toggle ---------- */

/* ---------- reveal on scroll ---------- */
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));

let draft = null;

function path(obj, p) { return p.split('.').reduce((o,k)=>o[k], obj); }
function setPath(obj, p, v) {
  const keys = p.split('.'); const last = keys.pop();
  keys.reduce((o,k)=>o[k], obj)[last] = v;
}

function fieldHTML(label, p, type) {
  const v = esc(path(draft, p));
  if (type === 'area') return `<div class="field"><label>${label}</label><textarea data-path="${p}">${v}</textarea></div>`;
  return `<div class="field"><label>${label}</label><input data-path="${p}" value="${v}"></div>`;
}

function buildForm() {
  const f = document.getElementById('editForm');
  f.innerHTML = `
    <details class="edit-group" open><summary>پیوندها و رمز / Links & passphrase</summary><div class="group-body">
      ${fieldHTML('آدرس گروه گوگل / Google Group URL', 'settings.googleGroupUrl')}
      ${fieldHTML('آدرس تلگرام / Telegram URL', 'settings.telegramUrl')}
      ${fieldHTML('رمز ویرایش / Edit passphrase', 'settings.passphrase')}
    </div></details>
    ${langGroup('fa', '🇮🇷 محتوای فارسی')}
    ${langGroup('en', '🌍 English content')}
  `;
  bindFormEvents();
}

function bindFormEvents() {
  const f = document.getElementById('editForm');
  f.querySelectorAll('[data-path]').forEach(inp => {
    inp.addEventListener('input', () => {
      let v = inp.value;
      if (inp.dataset.path.endsWith('.value')) v = parseInt(v,10) || 0;
      setPath(draft, inp.dataset.path, v);
    });
  });
  f.querySelectorAll('.add-row').forEach(btn => {
    btn.addEventListener('click', () => {
      const arrPath = btn.dataset.add;
      const arr = path(draft, arrPath);
      if (arrPath.endsWith('recentGatherings')) arr.push({date:'',name:'',presenter:'',url:''});
      else arr.push({title:'',author:'—',why:'',url:''});
      buildForm();
    });
  });
  f.querySelectorAll('.remove-row').forEach(btn => {
    btn.addEventListener('click', () => {
      const row = btn.closest('.repeat-row');
      const arr = path(draft, row.dataset.arr);
      arr.splice(+row.dataset.idx, 1);
      buildForm();
    });
  });
}

document.getElementById('editFab').addEventListener('click', () => {
  const pass = prompt('رمز ویرایش را وارد کنید\nEnter edit passphrase:');
  if (pass === null) return;
  if (pass !== CONTENT.settings.passphrase) { alert('رمز نادرست است / Wrong passphrase'); return; }
  draft = JSON.parse(JSON.stringify(CONTENT));
  buildForm();
  document.getElementById('editOverlay').classList.add('open');
});
document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('editOverlay').classList.remove('open');
});
document.getElementById('saveBtn').addEventListener('click', () => {
  const newJson = JSON.stringify(draft, null, 2);
  const open = '<script type="application/json" id="baham-content">';
  const start = ORIGINAL_HTML.indexOf(open) + open.length;
  const end = ORIGINAL_HTML.indexOf('<\/script>', start);
  const updated = '<!DOCTYPE html>\n' + ORIGINAL_HTML.slice(0, start) + '\n' + newJson + '\n' + ORIGINAL_HTML.slice(end);
  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href);
  // apply live too, so the editor sees changes immediately
  Object.assign(CONTENT, draft);
  render();
  document.getElementById('editOverlay').classList.remove('open');
  alert('فایل index.html دانلود شد. آن را روی سایت بارگذاری کنید.\nindex.html downloaded — upload it to publish.');
});
